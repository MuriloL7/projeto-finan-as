<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nome do app</title>

    <link rel="stylesheet" href="style.css">

    <script src="https://cdn.tailwindcss.com"></script>

</head>
<body>

    <div class="titulo">
        <h1>BEM-VINDO AO (NOME QUE VOU PENSAR)</h1>
    </div>

    <div class="form">
        <label for="nome">Nome:</label>
        <input type="text" id="nome" name="nome" placeholder="Digite o nome da pessoa"><br>
        <button type="submit" onclick="adicionarPessoa()">Adicionar pessoa</button>

        <button onclick="mostrar()">Mostrar pessoas</button>
    </div>

    <div class="lista">
        <ul id="listaNomes"></ul>
    </div>

    <script src="script.js"></script>
</body>
</html>
